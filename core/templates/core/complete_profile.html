{% extends "core/base.html" %}
{% block title %}Complete Your Profile – Sesika{% endblock %}

{% block content %}
<div class="auth-shell">
  <div class="auth-card">
    <h1 class="auth-title">One last step</h1>
    <p style="color:var(--text-2); margin-bottom:20px; font-size:0.93rem; text-align:center;">
      Tell people who you are so they can trust your listings.
    </p>

    {% if error %}
      <div style="background:#fce5e2; border:1px solid #fca5a5; border-radius:10px; padding:12px 14px; margin-bottom:14px; font-size:0.88rem; color:var(--danger);">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label" for="id_name">
          Your name <span class="req">*</span>
        </label>
        <input type="text" name="name" id="id_name" placeholder="e.g. Kwame Mensah" autofocus>
      </div>

      <div class="form-group">
        <label class="form-label" for="id_location_region">
          Region <span style="font-weight:400; color:var(--text-3);">— optional</span>
        </label>
        <select name="location_region" id="id_location_region">
          <option value="">— Select region —</option>
          {% for value, label in region_choices %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="id_location_city">
          City / Town <span style="font-weight:400; color:var(--text-3);">— optional</span>
        </label>
        <select name="location_city" id="id_location_city">
          <option value="">— Select town —</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px;">
        Save &amp; Continue
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 5L16 12L9 19"/></svg>
      </button>
    </form>
  </div>
</div>
<script>
(function() {
  var TOWNS = {{ towns_json|safe }};
  var regionEl = document.getElementById('id_location_region');
  var cityEl   = document.getElementById('id_location_city');

  function refreshTowns() {
    var towns = TOWNS[regionEl ? regionEl.value : ''] || [];
    cityEl.innerHTML = '<option value="">— Select town —</option>';
    towns.forEach(function(t) {
      var o = document.createElement('option');
      o.value = t; o.textContent = t;
      cityEl.appendChild(o);
    });
    cityEl.disabled = towns.length === 0;
  }

  if (regionEl) regionEl.addEventListener('change', refreshTowns);
  refreshTowns();
})();
</script>
{% endblock %}
